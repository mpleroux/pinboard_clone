<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shelf — Your Bookmarks</title>
    <!-- Dark mode: apply class before Alpine/page loads to avoid flash -->
    <script>
      (function () {
        const stored = localStorage.getItem("shelf_theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script src="js/storage.js" defer></script>
    <script src="js/import-export.js" defer></script>
    <script src="js/app.js" defer></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"
      defer
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body x-data="bookmarkApp()" x-init="init()">
    <!-- Header -->
    <header class="site-header">
      <div
        class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4"
      >
        <div class="flex items-center gap-3">
          <h1
            class="font-serif text-2xl tracking-tight"
            style="color: var(--ink)"
          >
            Shelf
          </h1>
          <span
            class="font-mono text-xs hidden sm:inline"
            style="color: var(--ink-faint)"
            >/ bookmarks</span
          >
        </div>

        <!-- Search -->
        <div class="relative flex-1 max-w-xs">
          <svg
            class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5"
            style="color: var(--ink-faint)"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            class="search-field"
            placeholder="search bookmarks..."
            x-model="search"
          />
        </div>

        <div class="flex gap-2 flex-shrink-0">
          <!-- Theme toggle -->
          <button
            class="btn-primary btn-primary-outline"
            style="padding: 9px 11px"
            @click="toggleTheme()"
            :aria-label="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
            :title="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            <!-- Sun icon (shown in dark mode) -->
            <svg
              x-show="isDark"
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
              />
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg
              x-show="!isDark"
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </svg>
          </button>

          <!-- Import/Export dropdown -->
          <div
            class="relative"
            x-data="{ open: false }"
            @keydown.escape="open = false"
          >
            <button
              class="btn-primary btn-primary-outline"
              @click="open = !open"
              @click.outside="open = false"
              aria-label="Import or export bookmarks"
            >
              <span class="hidden sm:inline">Import / Export</span>
              <span class="sm:hidden">⇅</span>
            </button>
            <div
              class="dropdown-menu"
              x-show="open"
              x-cloak
              @click="open = false"
            >
              <div class="dropdown-section">Export</div>
              <button class="dropdown-item" @click="exportJSON()">
                <span>⬇</span> Download JSON
              </button>
              <button class="dropdown-item" @click="exportNetscape()">
                <span>⬇</span> Download HTML
              </button>
              <div class="dropdown-section">Import</div>
              <button class="dropdown-item" @click="openImport()">
                <span>⬆</span> Import file…
              </button>
            </div>
          </div>

          <button class="btn-primary" @click="openAdd()">+ Add</button>
        </div>
      </div>
    </header>

    <!-- Mobile tag strip -->
    <div
      class="sidebar-mobile px-4 py-2 overflow-x-auto"
      style="
        border-bottom: 1px solid var(--rule);
        background: var(--paper-warm);
      "
    >
      <div class="flex gap-1.5 flex-nowrap min-w-max">
        <span
          class="tag-pill"
          :class="activeTag === '' ? 'active' : ''"
          @click="activeTag = ''"
          >all
          <span class="count-badge"
            >(<span x-text="bookmarks.length"></span>)</span
          ></span
        >
        <template x-for="tag in allTags" :key="tag.name">
          <span
            class="tag-pill"
            :class="activeTag === tag.name ? 'active' : ''"
            @click="activeTag = activeTag === tag.name ? '' : tag.name"
            x-text="tag.name + ' (' + tag.count + ')'"
          ></span>
        </template>
      </div>
    </div>

    <!-- Main layout -->
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex gap-8 relative z-10">
      <!-- Bookmarks list -->
      <main class="flex-1 min-w-0">
        <!-- Empty state -->
        <template x-if="filteredBookmarks.length === 0">
          <div class="text-center py-20" style="color: var(--ink-faint)">
            <p class="font-serif text-3xl italic mb-2">Nothing here yet.</p>
            <p class="font-mono text-xs" x-show="search || activeTag">
              Try clearing your search or tag filter.
            </p>
            <p class="font-mono text-xs" x-show="!search && !activeTag">
              Add your first bookmark to get started.
            </p>
          </div>
        </template>

        <!-- Bookmark rows -->
        <template x-for="bm in filteredBookmarks" :key="bm.id">
          <article class="bookmark-row py-4 px-1">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <!-- Title -->
                <a
                  :href="bm.url"
                  target="_blank"
                  rel="noopener"
                  class="font-serif text-lg leading-snug hover:underline decoration-1 underline-offset-2 block mb-0.5"
                  style="color: var(--ink)"
                  x-text="bm.title || bm.url"
                ></a>

                <!-- URL -->
                <a
                  :href="bm.url"
                  target="_blank"
                  rel="noopener"
                  class="url-text block mb-2 truncate"
                  x-text="bm.url"
                ></a>

                <!-- Tags -->
                <div
                  class="flex flex-wrap gap-1.5 mb-2"
                  x-show="bm.tags.length > 0"
                >
                  <template x-for="tag in bm.tags" :key="tag">
                    <span
                      class="tag-pill"
                      :class="activeTag === tag ? 'active' : ''"
                      @click="activeTag = activeTag === tag ? '' : tag"
                      x-text="tag"
                    ></span>
                  </template>
                </div>

                <!-- Date -->
                <span
                  class="font-mono text-xs"
                  style="color: var(--ink-faint)"
                  x-text="formatDate(bm.updatedAt)"
                ></span>
              </div>

              <!-- Actions -->
              <div class="flex gap-1.5 flex-shrink-0 pt-0.5">
                <button class="btn-ghost btn-ghost-ink" @click="openEdit(bm)">
                  Edit
                </button>
                <button class="btn-ghost btn-ghost-red" @click="openDelete(bm)">
                  Del
                </button>
              </div>
            </div>
          </article>
        </template>

        <!-- Count -->
        <p
          class="font-mono text-xs mt-6 text-right"
          style="color: var(--ink-faint)"
          x-show="filteredBookmarks.length > 0"
          x-text="filteredBookmarks.length + ' bookmark' + (filteredBookmarks.length !== 1 ? 's' : '')"
        ></p>
      </main>

      <!-- Sidebar (desktop) -->
      <aside class="sidebar w-52 flex-shrink-0">
        <div class="sticky top-20">
          <h2
            class="font-mono text-xs uppercase tracking-widest mb-3"
            style="color: var(--ink-faint); letter-spacing: 0.12em"
          >
            Tags
          </h2>

          <div class="space-y-1">
            <div>
              <span
                class="tag-pill"
                :class="activeTag === '' ? 'active' : ''"
                @click="activeTag = ''"
                >all bookmarks
                <span class="count-badge"
                  >(<span x-text="bookmarks.length"></span>)</span
                ></span
              >
            </div>
            <template x-for="tag in allTags" :key="tag.name">
              <div>
                <span
                  class="tag-pill"
                  :class="activeTag === tag.name ? 'active' : ''"
                  @click="activeTag = activeTag === tag.name ? '' : tag.name"
                >
                  <span x-text="tag.name"></span>
                  <span
                    class="count-badge"
                    x-text="'(' + tag.count + ')'"
                  ></span>
                </span>
              </div>
            </template>
          </div>

          <div class="mt-8 pt-6" style="border-top: 1px solid var(--rule)">
            <p class="font-mono text-xs" style="color: var(--ink-faint)">
              <span x-text="bookmarks.length"></span> saved ·
              <span x-text="allTags.length"></span> tags
            </p>
          </div>
        </div>
      </aside>
    </div>

    <!-- ─── ADD / EDIT MODAL ─── -->
    <div
      class="modal-overlay"
      x-show="showFormModal"
      x-cloak
      @click.self="showFormModal = false"
    >
      <div class="modal-box" @click.stop>
        <div class="px-6 py-4" style="border-bottom: 1px solid var(--rule)">
          <h2
            class="font-serif text-xl"
            x-text="editingId ? 'Edit bookmark' : 'Add bookmark'"
          ></h2>
        </div>
        <div class="px-6 py-5 space-y-4">
          <div>
            <label
              class="font-mono text-xs uppercase tracking-widest block mb-1.5"
              style="color: var(--ink-soft)"
              >Title</label
            >
            <input
              type="text"
              class="form-input"
              placeholder="Page title"
              x-model="form.title"
            />
          </div>
          <div>
            <label
              class="font-mono text-xs uppercase tracking-widest block mb-1.5"
              style="color: var(--ink-soft)"
              >URL <span style="color: var(--accent)">*</span></label
            >
            <input
              type="url"
              class="form-input"
              placeholder="https://example.com"
              x-model="form.url"
              @keydown.enter="saveForm()"
            />
          </div>
          <div>
            <label
              class="font-mono text-xs uppercase tracking-widest block mb-1.5"
              style="color: var(--ink-soft)"
              >Tags</label
            >
            <input
              type="text"
              class="form-input"
              placeholder="comma, separated, tags"
              x-model="form.tagsRaw"
              @keydown.enter="saveForm()"
            />
            <p class="font-mono text-xs mt-1" style="color: var(--ink-faint)">
              Separate with commas
            </p>
          </div>
        </div>
        <div
          class="px-6 py-4 flex justify-end gap-2"
          style="border-top: 1px solid var(--rule)"
        >
          <button
            class="btn-primary btn-primary-outline"
            @click="showFormModal = false"
          >
            Cancel
          </button>
          <button
            class="btn-primary"
            @click="saveForm()"
            :disabled="!form.url.trim()"
          >
            <span x-text="editingId ? 'Save changes' : 'Add bookmark'"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ─── IMPORT MODAL ─── -->
    <div
      class="modal-overlay"
      x-show="showImportModal"
      x-cloak
      @click.self="showImportModal = false"
    >
      <div class="modal-box" @click.stop style="max-width: 480px">
        <div class="px-6 py-4" style="border-bottom: 1px solid var(--rule)">
          <h2 class="font-serif text-xl">Import bookmarks</h2>
        </div>
        <div class="px-6 py-5 space-y-5">
          <!-- File drop zone -->
          <div
            class="import-zone"
            :class="importDragOver ? 'drag-over' : ''"
            @click="$refs.fileInput.click()"
            @dragover.prevent="importDragOver = true"
            @dragleave="importDragOver = false"
            @drop.prevent="handleFileDrop($event)"
          >
            <p
              class="font-mono text-xs mb-1"
              style="color: var(--ink-soft)"
              x-text="importFile ? '📄 ' + importFile.name : 'Click or drag a file here'"
            ></p>
            <p class="font-mono text-xs" style="color: var(--ink-faint)">
              Accepts .json (Shelf) or .html (Netscape)
            </p>
            <input
              type="file"
              class="hidden"
              accept=".json,.html,.htm"
              x-ref="fileInput"
              @change="handleFileSelect($event)"
            />
          </div>

          <!-- Merge strategy -->
          <div x-show="importFile">
            <p
              class="font-mono text-xs uppercase tracking-widest mb-2"
              style="color: var(--ink-soft); letter-spacing: 0.1em"
            >
              Import mode
            </p>
            <div class="space-y-2">
              <label
                class="radio-option"
                :class="importMode === 'merge' ? 'selected' : ''"
                @click="importMode = 'merge'"
              >
                <input
                  type="radio"
                  name="importMode"
                  value="merge"
                  x-model="importMode"
                  class="hidden"
                />
                <span class="font-mono text-xs">Merge</span>
                <span class="text-xs" style="color: var(--ink-soft)"
                  >— add new bookmarks, keep existing ones</span
                >
              </label>
              <label
                class="radio-option"
                :class="importMode === 'replace' ? 'selected' : ''"
                @click="importMode = 'replace'"
              >
                <input
                  type="radio"
                  name="importMode"
                  value="replace"
                  x-model="importMode"
                  class="hidden"
                />
                <span class="font-mono text-xs">Replace</span>
                <span class="text-xs" style="color: var(--ink-soft)"
                  >— overwrite all existing bookmarks</span
                >
              </label>
            </div>
            <p
              class="font-mono text-xs mt-2"
              style="color: var(--ink-faint)"
              x-show="importMode === 'replace'"
            >
              ⚠ This will delete all current bookmarks.
            </p>
          </div>
        </div>
        <div
          class="px-6 py-4 flex justify-end gap-2"
          style="border-top: 1px solid var(--rule)"
        >
          <button
            class="btn-primary btn-primary-outline"
            @click="showImportModal = false; importFile = null"
          >
            Cancel
          </button>
          <button
            class="btn-primary"
            @click="runImport()"
            :disabled="!importFile"
          >
            Import
          </button>
        </div>
      </div>
    </div>

    <!-- ─── TOAST ─── -->
    <template x-if="toast">
      <div
        class="toast"
        :class="toast.type === 'error' ? 'error' : ''"
        x-text="toast.msg"
      ></div>
    </template>

    <!-- ─── DELETE CONFIRM MODAL ─── -->
    <div
      class="modal-overlay"
      x-show="showDeleteModal"
      x-cloak
      @click.self="showDeleteModal = false"
    >
      <div class="modal-box" @click.stop style="max-width: 420px">
        <div class="px-6 py-4" style="border-bottom: 1px solid var(--rule)">
          <h2 class="font-serif text-xl">Delete bookmark?</h2>
        </div>
        <div class="px-6 py-5">
          <p class="text-sm mb-1" style="color: var(--ink-soft)">
            You're about to delete:
          </p>
          <p
            class="font-serif text-base italic"
            x-text="deletingBm ? (deletingBm.title || deletingBm.url) : ''"
          ></p>
          <p
            class="font-mono text-xs mt-1 truncate"
            style="color: var(--ink-faint)"
            x-text="deletingBm ? deletingBm.url : ''"
          ></p>
          <p class="font-mono text-xs mt-4" style="color: var(--ink-soft)">
            This cannot be undone.
          </p>
        </div>
        <div
          class="px-6 py-4 flex justify-end gap-2"
          style="border-top: 1px solid var(--rule)"
        >
          <button
            class="btn-primary btn-primary-outline"
            @click="showDeleteModal = false"
          >
            Cancel
          </button>
          <button
            class="btn-primary"
            style="background: var(--accent)"
            @click="confirmDelete()"
          >
            Delete
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
